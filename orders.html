<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larossa — Тапсырыс</title>
<link rel="shortcut icon" href="https://i.ibb.co.com/hFhh091B/logo.jpg" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.8/jquery.inputmask.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gr:#1b4332;--gr2:#2d6a4f;--bg:#f1f3f2;--brd:#dcdde1;--r:#ff4757}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);padding:12px;display:flex;justify-content:center;min-height:100vh}
.container{width:100%;max-width:640px;background:#fff;border-radius:22px;box-shadow:0 12px 40px rgba(0,0,0,.07);overflow:hidden;margin-bottom:40px;align-self:flex-start}
.header{padding:18px 22px;display:flex;align-items:center;border-bottom:1px solid #f0f0f0}
.logo-img{max-height:42px;width:auto;border-radius:8px}
.logo-text{margin-left:12px;font-size:21px;font-weight:800;color:#166645}
form{padding:22px}
.sec-title{font-size:11px;font-weight:700;color:#a0a0a0;text-transform:uppercase;letter-spacing:1.5px;margin:24px 0 12px;display:flex;align-items:center}
.sec-title::after{content:"";flex:1;height:1px;background:#f0f0f0;margin-left:10px}
label{display:block;margin-bottom:6px;font-size:13.5px;font-weight:600;color:var(--gr)}
input,select{width:100%;padding:13px;border:1.5px solid var(--brd);border-radius:12px;font-size:16px;outline:none;background:#fff;transition:border .25s;font-family:inherit;color:#222}
input:focus,select:focus{border-color:var(--gr2)}
.field{margin-bottom:16px}
.hidden{display:none}
.item-row{display:grid;grid-template-columns:1fr 80px 44px;gap:8px;margin-bottom:10px;align-items:center}
.add-btn{background:#f8f9fa;color:var(--gr2);border:2px dashed var(--gr2);padding:11px;width:100%;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;margin-bottom:8px;font-family:inherit;transition:background .2s}
.add-btn:hover{background:#ecfdf5}
.remove-btn{background:#fff0f0;color:var(--r);border:1px solid #ffdada;border-radius:10px;height:46px;cursor:pointer;font-size:18px}
.file-upload{border:2px dashed var(--brd);padding:18px;border-radius:14px;text-align:center;cursor:pointer;position:relative;transition:border .25s}
.file-upload:hover{border-color:var(--gr2);background:#f8faf9}
#receipt-preview{max-width:100%;height:auto;border-radius:10px;margin-top:12px;display:none}
.remove-file-btn{position:absolute;top:10px;right:10px;background:var(--r);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:none;z-index:10;font-weight:700;font-size:15px}
.time-check-wrap{display:flex;align-items:center;gap:10px;background:#f8faf9;padding:11px 14px;border-radius:12px;border:1px solid #eee;margin-bottom:14px;cursor:pointer}
.time-check-wrap input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--gr)}
.time-check-wrap span{font-size:14px;font-weight:500;color:#444}
.split-block{background:#f0fdf4;border:1.5px solid #a7f3d0;border-radius:14px;padding:14px;margin-bottom:8px}
.split-block label{color:#166534;font-size:13px}
.split-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.split-row:last-child{margin-bottom:0}
.pay-toggle{display:flex;align-items:center;gap:10px;background:#f0fdf4;padding:11px 14px;border-radius:12px;border:1px solid #a7f3d0;margin-bottom:12px;cursor:pointer}
.pay-toggle input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#059669}
.pay-toggle span{font-size:13.5px;font-weight:600;color:#166534}
.total-box{background:#f8faf9;padding:18px;border-radius:14px;margin-top:22px;border:1px solid var(--gr)}
.total-box label{color:var(--gr);font-size:14px;margin-bottom:8px}
.submit-btn{width:100%;padding:17px;background:var(--gr);color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;margin-top:18px;transition:background .25s,transform .1s;font-family:inherit}
.submit-btn:hover{background:var(--gr2)}.submit-btn:active{transform:scale(.98)}.submit-btn:disabled{background:#a0a0a0;cursor:not-allowed}
.popup{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);opacity:0;max-width:calc(100vw - 24px);text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.popup.show{opacity:1;transform:translateX(-50%) translateY(0)}
.popup.g{background:#059669}.popup.r{background:#dc2626}
.logistics-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--gr2);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto;font-family:inherit}
.logistics-btn:hover{background:#1b4332}
/* LOGISTICS MODAL */
.log-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;padding:12px;overflow-y:auto}
.log-overlay.show{display:block}
.log-box{max-width:560px;margin:0 auto 24px;background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.log-head{padding:16px;background:var(--gr);color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.log-head h2{margin:0;font-size:16px;display:flex;align-items:center;gap:8px}
.log-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:16px;flex-shrink:0}
/* SEARCH + FILTER ROW */
.log-filters{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid #eee;flex-wrap:wrap}
.log-search{position:relative;flex:1;min-width:180px}
.log-search i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;font-size:14px;pointer-events:none;z-index:1}
.log-search input{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--brd);border-radius:10px;font-size:14px;outline:none;font-family:inherit}
.log-search input:focus{border-color:var(--gr2)}
.log-mgr-filter{padding:10px 12px;border:1.5px solid var(--brd);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#222;min-width:140px;cursor:pointer}
.log-mgr-filter:focus{border-color:var(--gr2)}
.log-list{padding:12px;max-height:68vh;overflow-y:auto}
.log-card{border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:10px;background:#fafbfc}
.log-card:last-child{margin-bottom:0}
.log-card-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px}
.log-card-row:last-child{margin-bottom:0}
.log-card b{font-size:14px;color:#222}
.log-meta{font-size:12px;color:#777}
.log-track{display:flex;align-items:center;gap:8px;background:#e8f5e9;color:#166534;padding:7px 10px;border-radius:9px;font-size:12.5px;font-weight:600;margin-top:7px;justify-content:space-between}
.log-track-text{display:flex;align-items:center;gap:6px;overflow:hidden}
.log-track-text span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:#166534;color:#fff;border:none;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;font-family:inherit;transition:background .15s}
.copy-btn:hover{background:#1b4332}
.copy-btn i{font-size:10px}
.log-note{font-size:12px;color:#666;margin-top:5px;font-style:italic;padding:6px 10px;background:#fafafa;border-radius:8px;border-left:3px solid #ddd}
.log-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.log-status-new{background:#e3f2fd;color:#1565c0}
.log-status-process{background:#fff3e0;color:#e65100}
.log-status-ship{background:#e8f5e9;color:#2e7d32}
.log-status-done{background:#e8f5e9;color:#166534}
.log-status-return{background:#ffebee;color:#c62828}
.log-status-arrived{background:#fef9c3;color:#854d0e}
.log-empty{padding:28px;text-align:center;color:#888;font-size:14px}
.back{width:100%;max-width:420px;margin-top:10px;margin-left:10px}
.back a{text-decoration:none;color:#0f172a;font-weight:700;font-size:14px;display:inline-block;padding:10px 15px;border:1px solid #e2e8f0;border-radius:10px;background:#f1f5f9;transition:.3s}
.back a:hover{background:#0f172a;color:#fff;border-color:#0f172a}
@media(max-width:480px){
  .split-row{grid-template-columns:1fr}
  .item-row{grid-template-columns:1fr 70px 40px}
  form{padding:16px}
  .logistics-btn span{display:none}
  .logistics-btn{padding:10px 12px}
  .log-mgr-filter{width:100%;min-width:unset}
}
</style>
</head>
<body>
<div class="container">
  <div class="back"><a href="/">&#8592; Артқа</a></div>
  <div class="header">
    <img src="https://i.ibb.co.com/hFhh091B/logo.jpg" alt="Larossa" class="logo-img">
    <span class="logo-text" id="companyName">LAROSSA</span>
    <button type="button" class="logistics-btn" onclick="openLogisticsPopup()"><i class="fas fa-truck"></i><span>Жеткізулер</span></button>
  </div>
  <form id="orderForm">
    <div class="sec-title">Жауапты тұлға</div>
    <div class="field">
      <select id="manager_id" required oninvalid="this.setCustomValidity('Менеджерді таңдаңыз')" oninput="this.setCustomValidity('')">
        <option value="" disabled selected>Менеджерді таңдаңыз...</option>
      </select>
      <div id="managerHint" style="display:none;font-size:12px;margin-top:6px;"></div>
    </div>

    <div class="sec-title">Тапсырыс уақыты</div>
    <label class="time-check-wrap" for="manualTimeCheck">
      <input type="checkbox" id="manualTimeCheck" onchange="toggleTime()">
      <span>Уақытты қолмен таңдау</span>
    </label>
    <div id="manualTimeFields" class="hidden">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div><label>Күні:</label><input type="date" id="orderDate"></div>
        <div><label>Уақыты:</label><input type="time" id="orderTime"></div>
      </div>
    </div>

    <div class="sec-title">Клиент мәліметі</div>
    <div class="field"><input type="text" id="client_name" placeholder="Клиент аты-жөні" required oninvalid="this.setCustomValidity('Клиент атын жазыңыз')" oninput="this.setCustomValidity('')"></div>
    <div class="field"><input type="tel" id="client_phone" inputmode="numeric" placeholder="+7 (___) ___-____" required oninvalid="this.setCustomValidity('Телефонды жазыңыз')" oninput="this.setCustomValidity('')"></div>
    <div class="field"><input type="text" id="address" placeholder="Адрес (Қала, көше, үй)" required oninvalid="this.setCustomValidity('Мекен-жайды жазыңыз')" oninput="this.setCustomValidity('')"></div>

    <div class="sec-title">Тауарлар</div>
    <div id="tabletsContainer"></div>
    <button type="button" class="add-btn" onclick="addItem('tabletsContainer','tablet')">+ Планшет / Тауар қосу</button>
    <div id="giftsContainer"></div>
    <button type="button" class="add-btn" onclick="addItem('giftsContainer','gift')">+ Сыйлық қосу</button>

    <div class="sec-title">Жеткізу және Төлем</div>
    <div class="field">
      <label>Жеткізу түрі:</label>
      <select id="delivery_type">
        <option>Такси</option><option>Курьер</option><option>Почта</option><option>Поезд</option>
      </select>
    </div>
    <div id="singlePayBlock">
      <div class="field">
        <label>Төлем түрі:</label>
        <select id="payment_type" required oninvalid="this.setCustomValidity('Төлем түрін таңдаңыз')" oninput="this.setCustomValidity('')">
          <option value="" disabled selected>— таңдаңыз —</option>
          <option>Kaspi Transfer</option><option>Halyk Transfer</option>
          <option>Kaspi рассрочка</option><option>Halyk рассрочка</option>
          <option>Kaspi Red</option><option>Наличка</option>
        </select>
      </div>
    </div>
    <label class="pay-toggle" for="splitCheck">
      <input type="checkbox" id="splitCheck" onchange="toggleSplit()">
      <span>Пополам (екі төлем түрі)</span>
    </label>
    <div id="splitPayBlock" class="hidden">
      <div class="split-block">
        <div style="font-size:12px;font-weight:700;color:#166534;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Бірінші төлем</div>
        <div class="split-row">
          <div><label>Төлем түрі:</label>
            <select id="pay1_type"><option>Kaspi Transfer</option><option>Halyk Transfer</option><option>Kaspi рассрочка</option><option>Halyk рассрочка</option><option>Kaspi Red</option><option>Наличка</option></select>
          </div>
          <div><label>Сомасы (₸):</label><input type="number" id="pay1_amount" inputmode="numeric" placeholder="0" min="0" oninput="calcSplitTotal()"></div>
        </div>
        <div style="font-size:12px;font-weight:700;color:#166534;margin-bottom:12px;margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Екінші төлем</div>
        <div class="split-row">
          <div><label>Төлем түрі:</label>
            <select id="pay2_type"><option>Наличка</option><option>Kaspi Transfer</option><option>Halyk Transfer</option><option>Kaspi рассрочка</option><option>Halyk рассрочка</option><option>Kaspi Red</option></select>
          </div>
          <div><label>Сомасы (₸):</label><input type="number" id="pay2_amount" inputmode="numeric" placeholder="0" min="0" oninput="calcSplitTotal()"></div>
        </div>
        <div style="font-size:13px;color:#166534;font-weight:600;padding:10px 12px;background:#d1fae5;border-radius:8px;margin-top:4px">
          Жалпы: <span id="splitTotalDisp" style="font-size:16px;font-weight:800">0 ₸</span>
        </div>
      </div>
    </div>

    <div class="sec-title">Төлем чегі</div>
    <div class="field">
      <div class="file-upload" id="fileUploadBox">
        <button type="button" class="remove-file-btn" id="removeFileBtn" onclick="clearImg(event)">×</button>
        <div onclick="document.getElementById('receiptFile').click()">
          <div id="uploadText" style="color:#666;font-size:14px">📷 Чек суретін таңдау</div>
          <input type="file" id="receiptFile" accept="image/*" class="hidden" onchange="previewImg(this)">
          <img id="receipt-preview" src="" alt="Чек">
        </div>
      </div>
    </div>

    <div id="singlePriceBox" class="total-box">
      <label>Жалпы сатылған бағасы (₸):</label>
      <input type="number" id="price" inputmode="numeric" placeholder="0" required oninvalid="this.setCustomValidity('Бағасын жазыңыз')" oninput="this.setCustomValidity('')">
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">ТАПСЫРЫСТЫ ЖІБЕРУ</button>
  </form>
</div>

<div class="popup" id="popup"></div>

<div id="logisticsOverlay" class="log-overlay" onclick="if(event.target===this)closeLogisticsPopup()">
  <div class="log-box">
    <div class="log-head">
      <h2><i class="fas fa-truck"></i> Жетті (Алынуды күтуде)</h2>
      <button type="button" class="log-close" onclick="closeLogisticsPopup()"><i class="fas fa-times"></i></button>
    </div>
    <div class="log-filters">
      <div class="log-search">
        <i class="fas fa-search"></i>
        <input type="text" id="logSearchInp" placeholder="Телефон, аты, адрес, менеджер, жеткізу түрі..." oninput="filterLogisticsList()">
      </div>
      <select class="log-mgr-filter" id="logMgrFilter" onchange="filterLogisticsList()">
        <option value="">Барлық менеджер</option>
      </select>
      <select class="log-mgr-filter" id="logStatusFilter" onchange="filterLogisticsList()">
        <option value="">Барлық статус</option>
        <option value="Жаңа" selected>Жаңа</option>
        <option value="Процесте">Процесте</option>
        <option value="Жолда">Жолда</option>
        <option value="Қабылданды">Жетті</option>
        <option value="Қайтарылды">Қайтарылды</option>
      </select>
      <select class="log-mgr-filter" id="logSortFilter" onchange="filterLogisticsList()">
        <option value="desc">Жаңадан ескіге</option>
        <option value="asc">Ескіден жаңаға</option>
      </select>
    </div>
    <div id="logisticsList" class="log-list"></div>
  </div>
</div>

<script>
const SB_URL='https://jnuokhhqojlurvadcduv.supabase.co';
const SB_KEY='sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk';
const sb=typeof supabase!=='undefined'?supabase.createClient(SB_URL,SB_KEY):null;
const GSHEET_URL='https://script.google.com/macros/s/AKfycbxJbkVjqkFyeTYstJABPxsVRgya5SdYtptA09XCKcWUmve3njkl51thYyKRW40LLyw/exec';
const DPCT=9;
const PAY_OPTS_FALLBACK=['Kaspi Transfer','Halyk Transfer','Kaspi рассрочка','Halyk рассрочка','Kaspi Red','Наличка'];
const DELIVERY_OPTS_FALLBACK=['Такси','Курьер','Почта','Поезд'];
let tabletOptions=[],giftOptions=[],mgrBonusDefaults={},mgrMap={};

function safeQuery(fn){ return Promise.resolve().then(fn).then(function(r){ return r&&typeof r==='object'?r:{data:[]}; }).catch(function(){ return {data:[]}; }); }

$(document).ready(async function(){
  $('#client_phone').inputmask('+7 (999) 999-9999');
  await loadSiteData();
  loadCompanyName();
});

function loadCompanyName(){
  if(!sb)return;
  sb.from('site_display').select('company_name').eq('id',1).single().then(function(r){ if(r&&r.data&&r.data.company_name){ var el=document.getElementById('companyName'); if(el)el.textContent=r.data.company_name; } }).catch(function(){});
}

async function loadSiteData(){
  var mgrs=[],prods=[],bR={data:[]},payR={data:null},delR={data:null};
  if(!sb){ fillFallbacks(); return; }
  var rMgr1,rMgr2,rMgr3,rProd,rBonus,rPay,rDel;
  try{
    var res=await Promise.all([
      safeQuery(function(){return sb.from('managers_list').select('id,name').order('id');}),
      safeQuery(function(){return sb.from('managers').select('id,name').order('id');}),
      safeQuery(function(){return sb.from('site_managers').select('id,name').order('sort_order').order('id');}),
      safeQuery(function(){return sb.from('site_products').select('*').order('category').order('sort_order');}),
      safeQuery(function(){return sb.from('manager_bonus_settings').select('*');}),
      safeQuery(function(){return sb.from('payment_types').select('name').order('sort_order');}),
      safeQuery(function(){return sb.from('delivery_types').select('name').order('sort_order');})
    ]);
    rMgr1=res[0];rMgr2=res[1];rMgr3=res[2];rProd=res[3];rBonus=res[4];rPay=res[5];rDel=res[6];
  }catch(e){ fillFallbacks(); return; }
  mgrs=(rMgr1.data&&rMgr1.data.length)?rMgr1.data:(rMgr2.data&&rMgr2.data.length)?rMgr2.data:(rMgr3.data||[]);
  prods=(rProd.data||[]);bR=rBonus||{data:[]};payR=rPay||{data:null};delR=rDel||{data:null};
  mgrMap={};
  mgrs.forEach(function(m){mgrMap[m.id]=m.name;});
  var mgrSel=document.getElementById('manager_id');
  if(mgrSel){
    mgrSel.innerHTML='<option value="" disabled selected>Менеджерді таңдаңыз...</option>';
    if(mgrs.length) mgrs.forEach(function(m){mgrSel.add(new Option(m.name,m.id));});
    else mgrSel.add(new Option('— Менеджерлер жоқ —',''));
    mgrSel.required=mgrs.length>0;
  }
  mgrBonusDefaults={};
  ((bR&&bR.data)||[]).forEach(function(b){mgrBonusDefaults[b.manager_id]=b.default_bonus_percent;});
  var activeProds=prods.filter(function(p){return p.is_active!==false;});
  tabletOptions=activeProds.filter(function(p){return p.category==='tablet';}).sort(function(a,b){return (a.sort_order||99)-(b.sort_order||99);}).map(function(p){return p.name;});
  giftOptions=activeProds.filter(function(p){return p.category==='gift';}).sort(function(a,b){return (a.sort_order||99)-(b.sort_order||99);}).map(function(p){return p.name;});
  if(!tabletOptions.length)tabletOptions=['G2000','17 Pro Max','17 Pad Pro'];
  if(!giftOptions.length)giftOptions=['Смарт набор','Массажер','Смарт сағат','Переходник'];
  var payNames=(payR&&payR.data&&payR.data.length)?payR.data.map(function(p){return p.name;}):PAY_OPTS_FALLBACK;
  var delNames=(delR&&delR.data&&delR.data.length)?delR.data.map(function(d){return d.name;}):DELIVERY_OPTS_FALLBACK;
  var payOpts=payNames.map(function(n){return '<option value="'+n.replace(/"/g,'&quot;')+'">'+n.replace(/</g,'&lt;')+'</option>';}).join('');
  var delOpts=delNames.map(function(n){return '<option value="'+n.replace(/"/g,'&quot;')+'">'+n.replace(/</g,'&lt;')+'</option>';}).join('');
  document.getElementById('delivery_type').innerHTML=delOpts;
  document.getElementById('payment_type').innerHTML='<option value="" disabled selected>— таңдаңыз —</option>'+payOpts;
  document.getElementById('pay1_type').innerHTML=payOpts;
  document.getElementById('pay2_type').innerHTML=payOpts;
}

function fillFallbacks(){
  tabletOptions=tabletOptions.length?tabletOptions:['G2000','17 Pro Max','17 Pad Pro'];
  giftOptions=giftOptions.length?giftOptions:['Смарт набор','Массажер','Смарт сағат','Переходник'];
  var mgrSel=document.getElementById('manager_id');
  if(mgrSel&&mgrSel.options.length<=1) mgrSel.add(new Option('— Менеджерлер жоқ —',''));
  var payOpts=PAY_OPTS_FALLBACK.map(function(n){return '<option value="'+n.replace(/"/g,'&quot;')+'">'+n.replace(/</g,'&lt;')+'</option>';}).join('');
  var delOpts=DELIVERY_OPTS_FALLBACK.map(function(n){return '<option value="'+n.replace(/"/g,'&quot;')+'">'+n.replace(/</g,'&lt;')+'</option>';}).join('');
  var delEl=document.getElementById('delivery_type');if(delEl&&!delEl.options.length)delEl.innerHTML=delOpts;
  var payEl=document.getElementById('payment_type');if(payEl&&payEl.options.length<=1)payEl.innerHTML='<option value="" disabled selected>— таңдаңыз —</option>'+payOpts;
  var p1=document.getElementById('pay1_type');if(p1&&!p1.options.length)p1.innerHTML=payOpts;
  var p2=document.getElementById('pay2_type');if(p2&&!p2.options.length)p2.innerHTML=payOpts;
}

function buildOptions(arr){return arr.map(n=>`<option value="${n}">${n}</option>`).join('');}
function addItem(containerId,type){
  const div=document.createElement('div');div.className='item-row';
  const opts=type==='tablet'?buildOptions(tabletOptions):buildOptions(giftOptions);
  div.innerHTML=`<select class="${type}-select">${opts}</select><input type="number" inputmode="numeric" class="item-count" value="1" min="1" style="padding:13px"><button type="button" class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById(containerId).appendChild(div);
}

function toggleTime(){
  const on=document.getElementById('manualTimeCheck').checked;
  document.getElementById('manualTimeFields').classList.toggle('hidden',!on);
  if(on){const now=new Date();document.getElementById('orderDate').value=now.toISOString().slice(0,10);document.getElementById('orderTime').value=now.toTimeString().slice(0,5);}
}

function toggleSplit(){
  const on=document.getElementById('splitCheck').checked;
  document.getElementById('splitPayBlock').classList.toggle('hidden',!on);
  document.getElementById('singlePayBlock').classList.toggle('hidden',on);
  document.getElementById('singlePriceBox').classList.toggle('hidden',on);
  const pt=document.getElementById('payment_type');
  pt.required=!on;
  document.getElementById('price').required=!on;
  calcSplitTotal();
}

function calcSplitTotal(){
  const a1=parseFloat(document.getElementById('pay1_amount').value)||0;
  const a2=parseFloat(document.getElementById('pay2_amount').value)||0;
  document.getElementById('splitTotalDisp').textContent=(a1+a2).toLocaleString()+' ₸';
}

function previewImg(input){
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{
      document.getElementById('receipt-preview').src=e.target.result;
      document.getElementById('receipt-preview').style.display='block';
      document.getElementById('removeFileBtn').style.display='block';
      document.getElementById('uploadText').style.display='none';
    };
    r.readAsDataURL(input.files[0]);
  }
}
function clearImg(e){
  e.stopPropagation();
  document.getElementById('receiptFile').value='';
  document.getElementById('receipt-preview').src='';
  document.getElementById('receipt-preview').style.display='none';
  document.getElementById('removeFileBtn').style.display='none';
  document.getElementById('uploadText').style.display='block';
}

document.getElementById('orderForm').addEventListener('submit',async function(e){
  e.preventDefault();
  if(!sb){showPopup('Байланыс жоқ. Интернетті тексеріңіз.','r');return;}
  const btn=document.getElementById('submitBtn');
  btn.textContent='Жіберілуде...';btn.disabled=true;
  const isSplit=document.getElementById('splitCheck').checked;
  let products='';
  document.querySelectorAll('.tablet-select').forEach((s,i)=>{products+=s.value+' ('+document.querySelectorAll('#tabletsContainer .item-count')[i].value+' шт); ';});
  let gifts='';
  document.querySelectorAll('.gift-select').forEach((s,i)=>{gifts+=s.value+' ('+document.querySelectorAll('#giftsContainer .item-count')[i].value+' шт); ';});
  let finalTime;
  if(document.getElementById('manualTimeCheck').checked){
    const d=document.getElementById('orderDate').value,t=document.getElementById('orderTime').value;
    const local=new Date(`${d}T${t}`);
    finalTime=new Date(local.getTime()-local.getTimezoneOffset()*60000).toISOString();
  } else {
    const now=new Date();
    finalTime=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString();
  }
  try{
    let receiptUrl='';
    const file=document.getElementById('receiptFile').files[0];
    if(file){
      const fname=Date.now()+'_receipt.jpg';
      const{error:ue}=await sb.storage.from('receipts').upload(fname,file);
      if(ue)throw new Error('Сурет жүктелмеді: '+ue.message);
      const{data:ud}=sb.storage.from('receipts').getPublicUrl(fname);
      receiptUrl=ud.publicUrl;
    }
    const payload={
      created_at:finalTime,
      client_name:document.getElementById('client_name').value.trim(),
      client_phone:document.getElementById('client_phone').value.trim(),
      address:document.getElementById('address').value.trim(),
      product:products||'Таңдалмады',
      gift:gifts||'Жоқ',
      delivery_type:document.getElementById('delivery_type').value,
      receipt_url:receiptUrl
    };
    const mgrId=parseInt(document.getElementById('manager_id').value)||null;
    payload.manager_id=mgrId;
    if(mgrId){
      const defPct=typeof mgrBonusDefaults[mgrId]==='number'?mgrBonusDefaults[mgrId]:DPCT;
      payload.bonus_percent=defPct;
    }
    if(isSplit){
      payload.payment_type=document.getElementById('pay1_type').value;
      payload.price=parseFloat(document.getElementById('pay1_amount').value)||0;
      payload.payment_type2=document.getElementById('pay2_type').value;
      payload.price2=parseFloat(document.getElementById('pay2_amount').value)||0;
    } else {
      payload.payment_type=document.getElementById('payment_type').value;
      payload.price=parseFloat(document.getElementById('price').value)||0;
      payload.price2=0;payload.payment_type2=null;
    }
    const{error:dbErr}=await sb.from('orders').insert([payload]);
    if(dbErr)throw dbErr;
    fetch(GSHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(()=>{});
    btn.textContent='✅ ЖІБЕРІЛДІ!';btn.style.background='#059669';
    showPopup('Тапсырыс сәтті жіберілді!','g');
    setTimeout(()=>location.reload(),2200);
  } catch(err){
    console.error(err);
    showPopup('Қате: '+(err.message||'Белгісіз'),'r');
    btn.disabled=false;btn.textContent='Қайта жіберу';btn.style.background='';
  }
});

let pt;
function showPopup(msg,type='g'){
  const el=document.getElementById('popup');
  el.textContent=msg;el.className='popup show '+(type||'g');
  clearTimeout(pt);pt=setTimeout(()=>el.classList.remove('show'),3000);
}

function copyText(text,btn){
  const fallback=()=>{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showPopup('Көшірілді!','g');}catch{showPopup(text,'g');}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showPopup('Көшірілді!','g')).catch(fallback);
  } else fallback();
}

let logisticsOrders=[];
function openLogisticsPopup(){
  document.getElementById('logisticsOverlay').classList.add('show');
  document.getElementById('logSearchInp').value='';
  document.getElementById('logMgrFilter').value='';
  document.getElementById('logStatusFilter').value='Жаңа';
  document.getElementById('logSortFilter').value='desc';
  loadLogisticsOrders();
}
function closeLogisticsPopup(){
  document.getElementById('logisticsOverlay').classList.remove('show');
}

async function loadLogisticsOrders(){
  var listEl=document.getElementById('logisticsList');
  if(!listEl)return;
  listEl.innerHTML='<div class="log-empty"><i class="fas fa-spinner fa-spin"></i> Жүктелуде...</div>';
  if(!sb){listEl.innerHTML='<div class="log-empty">Байланыс жоқ</div>';return;}
  var ord,rM1,rM2,rM3;
  try{
    var res=await Promise.all([
      safeQuery(function(){return sb.from('orders').select('*').order('created_at',{ascending:false});}),
      safeQuery(function(){return sb.from('managers_list').select('id,name');}),
      safeQuery(function(){return sb.from('managers').select('id,name');}),
      safeQuery(function(){return sb.from('site_managers').select('id,name');})
    ]);
    ord=res[0];rM1=res[1];rM2=res[2];rM3=res[3];
  }catch(e){listEl.innerHTML='<div class="log-empty">Жүктеу қатесі</div>';return;}
  var data=ord.data||[];
  var mD=(rM1.data&&rM1.data.length)?rM1.data:(rM2.data&&rM2.data.length)?rM2.data:(rM3.data||[]);
  mD.forEach(function(m){mgrMap[m.id]=m.name;});
  logisticsOrders=(data||[])
    .map(o=>({...o,_mgrName:mgrMap[o.manager_id]||o.manager_name||'',_status:(o.status||'').trim()||'Жаңа'}));

  // Populate manager filter with names
  const mgrSel=document.getElementById('logMgrFilter');
  const currentVal=mgrSel.value;
  const mgrs=[...new Set(logisticsOrders.map(o=>o._mgrName).filter(Boolean))];
  mgrSel.innerHTML='<option value="">Барлық менеджер</option>';
  mgrs.forEach(m=>mgrSel.innerHTML+=`<option value="${m}">${m}</option>`);
  mgrSel.value=currentVal;

  filterLogisticsList();
}

function filterLogisticsList(){
  const q=(document.getElementById('logSearchInp').value||'').toLowerCase().trim();
  const mgrF=(document.getElementById('logMgrFilter').value||'');
  const stF=(document.getElementById('logStatusFilter').value||'');
  let list=logisticsOrders;
  if(mgrF) list=list.filter(o=>o._mgrName===mgrF);
  if(stF) list=list.filter(o=>o._status===stF.trim());
  const sortDir=(document.getElementById('logSortFilter').value||'desc');
  list=[...list].sort((a,b)=>{
    const da=new Date(a.created_at||0),db=new Date(b.created_at||0);
    return sortDir==='asc'?da-db:db-da;
  });
  if(q) list=list.filter(o=>{
    const qNum=q.replace(/\D/g,'');
    return (o.client_name||'').toLowerCase().includes(q)
      ||(o.client_phone||'').replace(/\D/g,'').includes(qNum&&qNum.length>2?qNum:'\x00')
      ||(o.product||'').toLowerCase().includes(q)
      ||(o.gift||'').toLowerCase().includes(q)
      ||(o.address||'').toLowerCase().includes(q)
      ||(o._mgrName||'').toLowerCase().includes(q)
      ||(o.delivery_type||'').toLowerCase().includes(q)
      ||(o.delivery_contact||'').toLowerCase().includes(q)
      ||(o.logistics_note||'').toLowerCase().includes(q)
      ||(o.created_at||'').slice(0,10).includes(q)
      ||String(Number(o.price||0)+Number(o.price2||0)).includes(q);
  });
  const listEl=document.getElementById('logisticsList');
  if(!list.length){listEl.innerHTML='<div class="log-empty">Тапсырыс табылмады</div>';return;}
  const stCls={Жаңа:'log-status-new',Процесте:'log-status-process',Жолда:'log-status-ship',Қабылданды:'log-status-done',Жетті:'log-status-arrived',Қайтарылды:'log-status-return'};
  const e2=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  listEl.innerHTML=list.map(o=>{
    const total=Number(o.price||0)+Number(o.price2||0);
    const date=o.created_at?new Date(o.created_at).toLocaleDateString('kk-KZ'):'';
    const st=o._status||'Жаңа';
    const mgrName=o._mgrName?`<span class="log-meta" style="background:#f0fdf4;color:#166534;padding:2px 7px;border-radius:6px;font-weight:600">${e2(o._mgrName)}</span>`:'';
    const trackHtml=o.delivery_contact?`
      <div class="log-track">
        <div class="log-track-text"><i class="fas fa-hashtag"></i><span>${e2(o.delivery_contact)}</span></div>
        <button class="copy-btn" onclick="copyText('${e2(o.delivery_contact)}',this)" title="Такси/жеткізуші номерін көшіру"><i class="fas fa-copy"></i> Такси номерін көшіру</button>
      </div>`:'';
    const noteHtml=o.logistics_note?`<div class="log-note">${e2(o.logistics_note)}</div>`:'';
    const stLabel = st === 'Қабылданды' ? 'Жетті' : st;
    return`<div class="log-card">
      <div class="log-card-row"><b>${e2(o.client_name||'—')}</b><span class="log-status ${stCls[st]||'log-status-new'}">${stLabel}</span></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.client_phone||'')}</span><span class="log-meta">${date}</span></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.address||'')}</span></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.product||'')}${o.gift?' + '+e2(o.gift):''}</span><b>${total.toLocaleString()} ₸</b></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.delivery_type||'')}</span>${mgrName}</div>
      ${trackHtml}${noteHtml}
    </div>`;
  }).join('');
}
</script>
